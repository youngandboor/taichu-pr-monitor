<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light">
    <title>TaiChu PR Monitor</title>
    <link rel="icon" href="/brand.png">
    <link rel="stylesheet" href="/app.css">
  </head>
  <body>
    <!-- Interface icons are from Lucide. See LUCIDE-LICENSE.txt. -->
    <svg class="icon-sprite" aria-hidden="true">
      <symbol id="icon-refresh" viewBox="0 0 24 24">
        <path d="M21 12a9 9 0 0 0-15-6.7L3 8"></path><path d="M3 3v5h5"></path>
        <path d="M3 12a9 9 0 0 0 15 6.7L21 16"></path><path d="M16 16h5v5"></path>
      </symbol>
      <symbol id="icon-search" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path>
      </symbol>
      <symbol id="icon-external" viewBox="0 0 24 24">
        <path d="M15 3h6v6"></path><path d="M10 14 21 3"></path>
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
      </symbol>
      <symbol id="icon-alert" viewBox="0 0 24 24">
        <path d="m21.7 18-8-14a2 2 0 0 0-3.4 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.7-3"></path>
        <path d="M12 9v4"></path><path d="M12 17h.01"></path>
      </symbol>
      <symbol id="icon-check" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"></path></symbol>
      <symbol id="icon-clock" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="9"></circle><path d="M12 7v5l3 2"></path>
      </symbol>
      <symbol id="icon-inbox" viewBox="0 0 24 24">
        <path d="M4 4h16v16H4z"></path><path d="M4 13h4l2 3h4l2-3h4"></path>
      </symbol>
      <symbol id="icon-chevron" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"></path></symbol>
      <symbol id="icon-x" viewBox="0 0 24 24"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></symbol>
      <symbol id="icon-send" viewBox="0 0 24 24"><path d="m22 2-7 20-4-9-9-4Z"></path><path d="M22 2 11 13"></path></symbol>
      <symbol id="icon-eye" viewBox="0 0 24 24">
        <path d="M2.1 12a10.9 10.9 0 0 1 19.8 0 10.9 10.9 0 0 1-19.8 0"></path><circle cx="12" cy="12" r="3"></circle>
      </symbol>
      <symbol id="icon-pause" viewBox="0 0 24 24"><path d="M8 5v14"></path><path d="M16 5v14"></path></symbol>
      <symbol id="icon-play" viewBox="0 0 24 24"><path d="m6 3 14 9-14 9Z"></path></symbol>
      <symbol id="icon-download" viewBox="0 0 24 24">
        <path d="M12 3v12"></path><path d="m7 10 5 5 5-5"></path><path d="M5 21h14"></path>
      </symbol>
      <symbol id="icon-user-x" viewBox="0 0 24 24">
        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="m17 8 5 5"></path><path d="m22 8-5 5"></path>
      </symbol>
      <symbol id="icon-plus" viewBox="0 0 24 24"><path d="M12 5v14"></path><path d="M5 12h14"></path></symbol>
      <symbol id="icon-trash" viewBox="0 0 24 24">
        <path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="M19 6l-1 14H6L5 6"></path><path d="M10 11v5"></path><path d="M14 11v5"></path>
      </symbol>
      <symbol id="icon-database" viewBox="0 0 24 24">
        <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M3 5v14c0 1.7 4 3 9 3s9-1.3 9-3V5"></path><path d="M3 12c0 1.7 4 3 9 3s9-1.3 9-3"></path>
      </symbol>
    </svg>

    <header class="app-header">
      <div class="header-inner">
        <div class="brand-lockup">
          <img src="/brand.png" alt="" width="38" height="38">
          <div>
            <div class="brand-title">TaiChu PR Monitor</div>
            <div class="brand-subtitle">SystemAgentDev / TaiChu</div>
          </div>
          <span class="environment-tag">内网</span>
        </div>
        <div class="header-actions">
          <div class="service-state" id="serviceState" data-tone="idle" role="status">
            <span class="state-dot" aria-hidden="true"></span>
            <span id="serviceStateText">等待首次扫描</span>
          </div>
          <button class="secondary-button compact-button" id="optOutButton" type="button" title="免打扰名单">
            <svg class="icon" aria-hidden="true"><use href="#icon-user-x"></use></svg>
            <span>免打扰</span>
          </button>
          <button class="secondary-button compact-button" id="updateButton" type="button" title="更新程序">
            <svg class="icon" aria-hidden="true"><use href="#icon-download"></use></svg>
            <span>更新程序</span>
          </button>
          <button class="secondary-button compact-button" id="pauseButton" type="button" title="暂停或恢复监控">
            <svg class="icon" aria-hidden="true"><use id="pauseButtonIcon" href="#icon-pause"></use></svg>
            <span id="pauseButtonText">暂停监控</span>
          </button>
          <button class="primary-button" id="scanButton" type="button">
            <svg class="icon" aria-hidden="true"><use href="#icon-refresh"></use></svg>
            <span>立即扫描</span>
          </button>
        </div>
      </div>
    </header>

    <main class="shell">
      <section class="overview" aria-labelledby="overviewTitle">
        <div class="section-heading-row">
          <div>
            <h1 id="overviewTitle">运行概览</h1>
            <p id="scanMeta">正在读取本地状态</p>
          </div>
        </div>
        <dl class="metrics-band" aria-label="监控指标">
          <div class="metric"><dt>开放 PR</dt><dd id="metricOpen">--</dd></div>
          <div class="metric" data-tone="danger"><dt>当前失败</dt><dd id="metricFailing">--</dd></div>
          <div class="metric" data-tone="warning"><dt>待发送</dt><dd id="metricPending">--</dd></div>
          <div class="metric" data-tone="accent"><dt>需人工处理</dt><dd id="metricAttention">--</dd></div>
        </dl>
        <div class="storage-band" id="storageBand" data-tone="normal">
          <div class="storage-heading">
            <span class="storage-title"><svg class="icon" aria-hidden="true"><use href="#icon-database"></use></svg>本地存储</span>
            <span class="storage-health" id="storageHealth">正在读取</span>
          </div>
          <dl class="storage-metrics">
            <div><dt>数据库占用</dt><dd id="storageDatabase">--</dd></div>
            <div><dt>可回收空间</dt><dd id="storageReclaimable">--</dd></div>
            <div><dt>磁盘剩余</dt><dd id="storageFree">--</dd></div>
            <div><dt>磁盘总量</dt><dd id="storageTotal">--</dd></div>
          </dl>
          <progress class="storage-track" id="storageProgress" max="100" value="0" aria-label="磁盘已用比例"></progress>
        </div>
      </section>

      <section class="notice" id="notice" hidden aria-live="polite">
        <svg class="icon" aria-hidden="true"><use href="#icon-alert"></use></svg>
        <div><strong id="noticeTitle"></strong><span id="noticeBody"></span></div>
      </section>

      <section class="workspace" aria-label="监控工作区">
        <div class="workspace-toolbar">
          <div class="tabs" role="tablist" aria-label="数据视图">
            <button id="prTab" class="tab-button active" type="button" role="tab" aria-selected="true" data-view="prs">
              PR 状态 <span id="prTabCount" class="tab-count">0</span>
            </button>
            <button id="outboxTab" class="tab-button" type="button" role="tab" aria-selected="false" data-view="outbox">
              消息发送 <span id="outboxTabCount" class="tab-count">0</span>
            </button>
          </div>
          <div class="toolbar-controls">
            <label class="search-field">
              <svg class="icon" aria-hidden="true"><use href="#icon-search"></use></svg>
              <span class="sr-only">搜索</span>
              <input id="searchInput" type="search" placeholder="搜索 PR、标题或提交人" autocomplete="off">
            </label>
            <div class="segmented" id="prFilters" aria-label="PR 筛选">
              <button class="segment active" type="button" data-filter="all" aria-pressed="true">全部</button>
              <button class="segment" type="button" data-filter="failing" aria-pressed="false">失败</button>
              <button class="segment" type="button" data-filter="clear" aria-pressed="false">无失败</button>
            </div>
            <div class="segmented" id="outboxFilters" aria-label="发送筛选" hidden>
              <button class="segment active" type="button" data-filter="all" aria-pressed="true">全部 <span class="filter-count" id="outboxCountAll">0</span></button>
              <button class="segment" type="button" data-filter="pending" aria-pressed="false">待发送 <span class="filter-count" id="outboxCountPending">0</span></button>
              <button class="segment" type="button" data-filter="attention" aria-pressed="false">需人工 <span class="filter-count" id="outboxCountAttention">0</span></button>
              <button class="segment" type="button" data-filter="sent" aria-pressed="false">已发送 <span class="filter-count" id="outboxCountSent">0</span></button>
              <button class="segment" type="button" data-filter="suppressed" aria-pressed="false">已跳过 <span class="filter-count" id="outboxCountSuppressed">0</span></button>
            </div>
          </div>
        </div>

        <div id="loadingState" class="loading-state">
          <span class="spinner" aria-hidden="true"></span><span>读取监控状态</span>
        </div>

        <div id="prView" role="tabpanel" aria-labelledby="prTab" hidden>
          <div class="data-header pr-grid" aria-hidden="true">
            <span>合并请求</span><span>提交人</span><span>当前命令</span><span>关键状态</span><span>最近扫描</span>
          </div>
          <div id="prRows" class="data-body"></div>
        </div>

        <div id="outboxView" role="tabpanel" aria-labelledby="outboxTab" hidden>
          <div class="list-notice" id="outboxLimitNotice" hidden></div>
          <div class="data-header outbox-grid" aria-hidden="true">
            <span>消息</span><span>收件人</span><span>状态</span><span>尝试</span><span>更新时间</span><span></span>
          </div>
          <div id="outboxRows" class="data-body"></div>
        </div>
      </section>
    </main>

    <dialog class="detail-dialog" id="prDialog">
      <div class="dialog-heading">
        <div><span class="dialog-eyebrow">合并请求</span><h2 id="prDialogTitle"></h2></div>
        <button class="icon-button" type="button" data-close-dialog="prDialog" aria-label="关闭">
          <svg class="icon" aria-hidden="true"><use href="#icon-x"></use></svg>
        </button>
      </div>
      <div id="prDialogBody" class="dialog-body"></div>
      <div class="dialog-actions">
        <button class="secondary-button" type="button" data-close-dialog="prDialog">关闭</button>
        <a class="primary-button" id="prDialogLink" href="#" target="_blank" rel="noreferrer">
          打开 Gitea <svg class="icon" aria-hidden="true"><use href="#icon-external"></use></svg>
        </a>
      </div>
    </dialog>

    <dialog class="detail-dialog" id="outboxDialog">
      <div class="dialog-heading">
        <div><span class="dialog-eyebrow">发送记录</span><h2 id="outboxDialogTitle"></h2></div>
        <button class="icon-button" type="button" data-close-dialog="outboxDialog" aria-label="关闭">
          <svg class="icon" aria-hidden="true"><use href="#icon-x"></use></svg>
        </button>
      </div>
      <div id="outboxDialogBody" class="dialog-body"></div>
      <div class="dialog-actions">
        <button class="secondary-button" type="button" data-close-dialog="outboxDialog">关闭</button>
        <button class="danger-button" id="outboxDialogRetry" type="button" hidden>
          <svg class="icon" aria-hidden="true"><use href="#icon-refresh"></use></svg>重新发送
        </button>
      </div>
    </dialog>

    <dialog class="management-dialog" id="optOutDialog">
      <div class="dialog-heading">
        <div><span class="dialog-eyebrow">消息设置</span><h2>免打扰名单</h2></div>
        <button class="icon-button" type="button" data-close-dialog="optOutDialog" aria-label="关闭">
          <svg class="icon" aria-hidden="true"><use href="#icon-x"></use></svg>
        </button>
      </div>
      <div class="dialog-body management-body">
        <section class="management-section" aria-labelledby="optOutAddTitle">
          <div class="management-section-heading">
            <div><h3 id="optOutAddTitle">添加 WeLink 账号</h3></div>
          </div>
          <div class="add-recipient-row">
            <label class="search-field wide-search">
              <svg class="icon" aria-hidden="true"><use href="#icon-search"></use></svg>
              <span class="sr-only">WeLink 8 位工号</span>
              <input id="optOutInput" type="search" placeholder="输入 00000001 或 y00000001" autocomplete="off" spellcheck="false">
            </label>
            <button class="primary-button" id="addOptOutButton" type="button" disabled>
              <svg class="icon" aria-hidden="true"><use href="#icon-plus"></use></svg>加入免打扰
            </button>
          </div>
          <div class="candidate-list" id="candidateList" aria-live="polite"></div>
        </section>
        <section class="management-section" aria-labelledby="optOutCurrentTitle">
          <div class="management-section-heading">
            <div><h3 id="optOutCurrentTitle">当前名单</h3><p id="optOutSummary">0 人</p></div>
          </div>
          <div class="opt-out-list" id="optOutList"></div>
        </section>
      </div>
      <div class="dialog-actions"><button class="secondary-button" type="button" data-close-dialog="optOutDialog">完成</button></div>
    </dialog>

    <dialog class="confirm-dialog" id="retryDialog">
      <div class="dialog-heading">
        <div><span class="dialog-eyebrow">消息发送</span><h2>重新加入发送队列</h2></div>
        <button class="icon-button" type="button" data-close-dialog="retryDialog" aria-label="关闭">
          <svg class="icon" aria-hidden="true"><use href="#icon-x"></use></svg>
        </button>
      </div>
      <p id="retryDialogText" class="confirm-copy"></p>
      <div class="dialog-actions">
        <button class="secondary-button" type="button" data-close-dialog="retryDialog">取消</button>
        <button class="danger-button" id="confirmRetryButton" type="button">
          <svg class="icon" aria-hidden="true"><use href="#icon-send"></use></svg>确认重试
        </button>
      </div>
    </dialog>

    <dialog class="confirm-dialog" id="actionDialog">
      <div class="dialog-heading">
        <div><span class="dialog-eyebrow" id="actionDialogEyebrow">请确认</span><h2 id="actionDialogTitle"></h2></div>
        <button class="icon-button" type="button" data-close-dialog="actionDialog" aria-label="关闭">
          <svg class="icon" aria-hidden="true"><use href="#icon-x"></use></svg>
        </button>
      </div>
      <p id="actionDialogText" class="confirm-copy"></p>
      <div class="dialog-actions">
        <button class="secondary-button" type="button" data-close-dialog="actionDialog">取消</button>
        <button class="danger-button" id="confirmActionButton" type="button">确认</button>
      </div>
    </dialog>

    <div class="toast-region" aria-live="polite" aria-atomic="true">
      <div class="toast" id="toast" role="status"></div>
    </div>
    <script src="/app.js" defer></script>
  </body>
</html>
